<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <style>
        body { width: 250px; padding: 15px; font-family: Tahoma, Arial; text-align: center; }
        input { width: 90%; padding: 8px; margin-bottom: 10px; text-align: center; }
        button { width: 100%; padding: 10px; background-color: #007bff; color: white; border: none; cursor: pointer; border-radius: 5px; }
        button:hover { background-color: #0056b3; }
        #status { margin-top: 10px; font-size: 12px; color: green; }
    </style>
</head>
<body>
    <h3>استخراج از روبیکا</h3>
    <input type="number" id="newsCount" placeholder="تعداد خبر (مثلا 5000)" value="50">
    <button id="startBtn">شروع استخراج</button>
    <div id="status"></div>

    <script src="popup.js"></script>
</body>
</html>
